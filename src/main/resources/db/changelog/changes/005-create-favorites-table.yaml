databaseChangeLog:
  - changeSet:
      id: 005-create-favorites-table
      author: janos
      changes:
        - createTable:
            tableName: FAVORITES
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: auction_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: FAVORITES
            baseColumnNames: user_id
            referencedTableName: USERS
            referencedColumnNames: id
            constraintName: fk_favorite_user

        - addForeignKeyConstraint:
            baseTableName: FAVORITES
            baseColumnNames: auction_id
            referencedTableName: AUCTIONS
            referencedColumnNames: id
            constraintName: fk_favorite_auction

        - addUniqueConstraint:
            tableName: FAVORITES
            columnNames: user_id,auction_id
            constraintName: uk_favorite_user_auction

        - createIndex:
            tableName: FAVORITES
            indexName: idx_favorites_user_id
            columns:
              - column:
                  name: user_id

        - createIndex:
            tableName: FAVORITES
            indexName: idx_favorites_auction_id
            columns:
              - column:
                  name: auction_id