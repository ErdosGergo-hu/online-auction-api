databaseChangeLog:
  - changeSet:
      id: 004-create-bids-table
      author: janos
      changes:
        - createTable:
            tableName: BIDS
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: auction_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: bidder_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: amount_huf
                  type: NUMERIC(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: BIDS
            baseColumnNames: auction_id
            referencedTableName: AUCTIONS
            referencedColumnNames: id
            constraintName: fk_bid_auction

        - addForeignKeyConstraint:
            baseTableName: BIDS
            baseColumnNames: bidder_id
            referencedTableName: USERS
            referencedColumnNames: id
            constraintName: fk_bid_bidder

        - createIndex:
            tableName: BIDS
            indexName: idx_bids_auction_id
            columns:
              - column:
                  name: auction_id

        - createIndex:
            tableName: BIDS
            indexName: idx_bids_bidder_id
            columns:
              - column:
                  name: bidder_id