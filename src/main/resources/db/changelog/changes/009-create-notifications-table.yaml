databaseChangeLog:
  - changeSet:
      id: 009-create-notifications-table
      author: Gergo
      changes:

        - createTable:
            tableName: NOTIFICATIONS
            columns:

              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: message
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: read
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false