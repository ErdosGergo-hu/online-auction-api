databaseChangeLog:
  - changeSet:
      id: 003-create-auctions-table
      author: janos
      changes:
        - createTable:
            tableName: AUCTIONS
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: item_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: starting_price_huf
                  type: NUMERIC(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: current_price_huf
                  type: NUMERIC(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: start_date_time
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: end_date_time
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: seller_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: bidder_id
                  type: BIGINT

        - addForeignKeyConstraint:
            baseTableName: AUCTIONS
            baseColumnNames: item_id
            referencedTableName: ITEMS
            referencedColumnNames: id
            constraintName: fk_auction_item

        - addForeignKeyConstraint:
            baseTableName: AUCTIONS
            baseColumnNames: seller_id
            referencedTableName: USERS
            referencedColumnNames: id
            constraintName: fk_auction_seller

        - addForeignKeyConstraint:
            baseTableName: AUCTIONS
            baseColumnNames: bidder_id
            referencedTableName: USERS
            referencedColumnNames: id
            constraintName: fk_auction_bidder

        - addUniqueConstraint:
            tableName: AUCTIONS
            columnNames: item_id
            constraintName: uk_auction_item